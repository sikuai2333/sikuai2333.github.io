# 导航菜单配置文件 - Stack主题 - Sikuai环境
# 该文件定义网站顶部和侧边栏的导航链接

# 社交媒体链接配置 (显示在侧边栏底部)
social:
- identifier: github     # 链接的唯一标识符
  name: GitHub           # 显示的名称
  url: https://github.com/sikuai2333  # 链接地址
  params:
    icon: brand-github   # 图标名称，使用Tabler图标集


- identifier: bilibili    # 链接的唯一标识符
  name: Bilibili          # 显示的名称
  url: https://space.bilibili.com/274581343  # 链接地址
  params:
    icon: bilibili # 图标名称，使用Tabler图标集

- identifier: mail    # 链接的唯一标识符
  name: Mail           # 显示的名称
  url: mailto:2016828100@qq.com  # 链接地址
  params:
    icon: mail  # 图标名称，使用Tabler图标集


# 提示: 添加更多社交媒体可复制上面的模板
# 图标放在static/icons/
