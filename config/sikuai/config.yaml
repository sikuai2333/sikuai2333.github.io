##########################################
# Hugo博客配置文件 - Stack主题 - Sikuai环境
##########################################

# 站点基本信息
baseurl: "https://sikua.fun"     # 网站的基本URL，部署前需修改
languageCode: "zh-cn"            # 网站的语言代码
title: "四块的小窝"               # 网站标题

# 内容语言配置
defaultContentLanguage: "zh-cn"   # 默认内容语言
                                  # 可选值: en, fr, id, ja, ko, pt-br, zh-cn, zh-tw, es, de, nl, it, th, el, uk, ar

# 中日韩语言支持
# 如果DefaultContentLanguage是中文、日文或韩文，设为true可确保摘要和字数统计正常
hasCJKLanguage: true

# Disqus评论系统配置
disqusShortname: "sikuai2333"     # 更改为你的Disqus短名称

# 分页设置
pagination:
  pagerSize: 5                    # 分页导航中显示的页码数量

