# 相关文章配置文件 - Stack主题 - Sikuai环境
# 该文件定义了Hugo如何确定文章之间的关联性
# 用于在文章底部显示"相关文章"部分

includeNewer: true    # 是否包含比当前文章更新的文章
threshold: 60         # 相关性阈值，范围0-100，越高要求越相似
toLower: false        # 匹配时是否将字符串转为小写

# 用于确定文章相关性的索引及其权重
indices:
- name: tags          # 根据文章标签判断相关性
  weight: 100         # 标签匹配的权重值

- name: categories    # 根据文章分类判断相关性
  weight: 200         # 分类匹配的权重值，比标签更重要

# 权重越高，该索引在判断相关性时越重要
# 此配置中，同类别的文章比同标签的文章更有可能被判定为相关
