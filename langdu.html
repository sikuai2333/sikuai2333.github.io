<body>

    <div>

        <textarea id="textarea"></textarea>
    </div>
    <div><button id="play">įĄŪåŪ</button></div>
    <h3> åķäŧ</h3>
    <div>
        <!-- https://tts.baidu.com/text2audio?tex=ïŋ―Ųķïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ïģïŋ―&cuid=baike&lan=ZH&ctp=1&pdt=301&vol=9&rate=32&per=6 -->
        <p>lan:<input id="lan" type="text" value="zh" />(ZH/EN)</p>

        <p>vol:<input id="vol" type="number" value="9" /></p>

<script type="text/javascript">
    // ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ö§ïŋ―ïŋ―
    if ('speechSynthesis' in window) {
        $(function () {
            // Ęđïŋ―Ãžïŋ―Ęąïŋ―ïŋ―ïŋ―ėē―ïŋ―ïŋ―ČĄïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
            var langsInterval = setInterval(() => {
                // ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
                var langs = window.speechSynthesis.getVoices();
                if (langs.length > 0) {
                    clearInterval(langsInterval);
                }
                for (var index = 0; index < langs.length; index++) {
                    var lang = langs[index];
                    var option = $("<option>").val(lang.lang).text(lang.name + ' - ' + lang.lang);
                    $("#langs").append(option);
                }
            }, 1000);
        });
 
        $("#play").on('click', function (e) {
            var text = $("#textarea").val();
            var msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = $("#langs").val();
            window.speechSynthesis.speak(msg);
        });
    } else {
        // Ah man, speech synthesis isn't supported.
        alert("ïŋ―ïŋ―Įļïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ö§ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ïģïŋ―ïŋ―Ęķïŋ―")
    }
 
    $('#ttsBaiduPlay').on('click', function (e) {
        var ttsUrl = 'https://tts.baidu.com/text2audio?';
        var ttsText = $('#ttsBaiduText').val();
        // ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
        var urlParameter = [];
        urlParameter.push('lan=' + $.trim($('#lan').val()));
        urlParameter.push('pdt=' + $.trim($('#pdt').val()));
        urlParameter.push('vol=' + $.trim($('#vol').val()));
        urlParameter.push('per=' + $.trim($('#per').val()));
        urlParameter.push('cuid=baike');
        urlParameter.push('ctp=1');
        urlParameter.push('tex=' + encodeURIComponent(ttsText));
        var address = ttsUrl + urlParameter.join('&');
 
        // ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ö§ïŋ―ÖĢïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―autoplayïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Įēïŋ―ïŋ―Üžïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
        var audio = document.createElement('audio');
        audio.autoplay = true;
        audio.preload = true;
        audio.controls = true;
        audio.src = address;
        audio.addEventListener('ended', function () {
            // ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ōēĨ·ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Æģïŋ―audioïŋ―ïŋ―domïŋ―ïŋ―ïŋ―ïŋ―
            document.body.removeChild(audio);
        }, false);
        audio.addEventListener('error', function () {
            document.body.removeChild(audio);
            console.log('ïŋ―ÏģÉģïŋ―ïŋ―ïŋ―urlïŋ―ïŋ―' + address + '\nAudioïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ëĢš' + audio.error.code);
        }, false);
        audio.loop = false;
        audio.volume = 1;
        // ïŋ―ïŋ―bodyÔŠïŋ―ïŋ―ïŋ―ïŋ―apppendïŋ―ïŋ―Æĩïŋ―Øžïŋ―
        document.body.append(audio);
 
    });
 
</script>
